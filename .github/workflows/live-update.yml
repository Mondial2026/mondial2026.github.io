name: MAJ live data.json (Coupe du Monde 2026)

# Met à jour data.json automatiquement pendant les matchs, sans Claude.
# Fenêtres de match en UTC : ~15h → 05h. Deux plages car un cron unique ne peut
# pas franchir minuit. Granularité ~15 min (GitHub peut retarder sous charge).
on:
  schedule:
    - cron: "*/15 15-23 * * *"   # après-midi / soirée UTC
    - cron: "*/15 0-5 * * *"     # nuit UTC (matchs tardifs)
  workflow_dispatch: {}           # bouton « Run workflow » pour tester à la main

# Anti-chevauchement : une seule exécution à la fois
concurrency:
  group: live-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "24"

      - name: Générer data.json
        env:
          DATA_PATH: data.json
          FETCH_GOALS: "1"
        run: node scripts/update-data.mjs

      - name: Commit si data.json a changé
        run: |
          if git diff --quiet -- data.json; then
            echo "Pas de changement — rien à committer."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "MAJ live data.json [skip ci]"
          # Rebase sur l'éventuel push de la tâche Claude pour éviter les conflits.
          # En cas de conflit sur data.json (course avec la MAJ quotidienne), on
          # garde NOTRE version (la plus fraîche) puis on continue le rebase ;
          # sinon on abandonne le rebase pour ne jamais rester bloqué au milieu.
          for i in 1 2 3; do
            if ! git pull --rebase --autostash origin "${GITHUB_REF_NAME}"; then
              if git status --porcelain | grep -q "^UU data.json"; then
                git checkout --theirs data.json && git add data.json
                GIT_EDITOR=true git rebase --continue || { git rebase --abort 2>/dev/null || true; }
              else
                git rebase --abort 2>/dev/null || true
              fi
            fi
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Push OK"; exit 0
            fi
            echo "Push refusé (course), nouvelle tentative $i…"; sleep 5
          done
          echo "Échec du push après 3 tentatives (sera retenté au prochain cron)."
          exit 1
