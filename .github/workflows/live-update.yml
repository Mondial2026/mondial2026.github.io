name: MAJ live data.json (Coupe du Monde 2026)

# Met à jour data.json automatiquement pendant les matchs, sans Claude.
# Fenêtres de match en UTC : ~15h → 05h. Deux plages car un cron unique ne peut
# pas franchir minuit. Granularité ~15 min (GitHub peut retarder sous charge).
on:
  schedule:
    - cron: "*/15 15-23 * * *"   # après-midi / soirée UTC
    - cron: "*/15 0-5 * * *"     # nuit UTC (matchs tardifs)
  workflow_dispatch: {}           # bouton « Run workflow » pour tester à la main

# Anti-chevauchement : une seule exécution à la fois
concurrency:
  group: live-update
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Générer data.json
        env:
          DATA_PATH: data.json
          FETCH_GOALS: "1"
        run: node scripts/update-data.mjs

      - name: Commit si data.json a changé
        run: |
          if git diff --quiet -- data.json; then
            echo "Pas de changement — rien à committer."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.json
          git commit -m "MAJ live data.json [skip ci]"
          # Rebase sur l'éventuel push de la tâche Claude pour éviter les conflits
          for i in 1 2 3; do
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              echo "Push OK"; exit 0
            fi
            echo "Push refusé (course), nouvelle tentative $i…"; sleep 5
          done
          echo "Échec du push après 3 tentatives (sera retenté au prochain cron)."
          exit 1
